name: Supabase Table Backup

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Create backup folder
        run: |
          mkdir -p supabase_backups

      - name: Backup selected tables
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d_%H-00")
          FILE="supabase_backups/backup_${TIMESTAMP}.sql"

          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" \
            --data-only \
            --column-inserts \
            --table=public.employees \
            --table=public.matches \
            --table=public.predictions \
            > "$FILE"

          gzip "$FILE"

      - name: Delete backups older than 72 hours
        run: |
          find supabase_backups -name "*.sql.gz" -type f -mmin +4320 -delete

      - name: Commit backup files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add supabase_backups/

          if git diff --cached --quiet; then
            echo "No backup changes to commit"
          else
            git commit -m "Hourly Supabase table backup"
            git push
          fi